<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e0e10">
<title>Seguimiento de encargos</title>
<script>
window.supabase = {
  createClient(url, key) {
    const headers = { 'apikey': key, 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' };
    return {
      from(table) {
        const base = `${url}/rest/v1/${table}`;
        let _select = '*', _filters = [], _single = false;
        const q = {
          select(cols) { _select = cols; return q; },
          eq(col, val) { _filters.push(`${col}=eq.${val}`); return q; },
          single() { _single = true; return q; },
          async then(resolve, reject) {
            try {
              const qs = `?select=${_select}${_filters.map(f=>'&'+f).join('')}`;
              const r = await fetch(base + qs, { headers });
              const rows = await r.json();
              if (!r.ok) { resolve({ data: null, error: rows }); return; }
              const data = _single ? (rows[0] || null) : rows;
              resolve({ data, error: null });
            } catch(e) { resolve({ data: null, error: { message: e.message } }); }
          }
        };
        return q;
      }
    };
  }
};
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0e0e10;color:#e8e8f0;font-family:'Syne',sans-serif;min-height:100vh;padding:0;}

  .header{background:#16161e;border-bottom:1px solid #2a2a38;padding:16px 20px;display:flex;align-items:center;gap:12px;}
  .logo{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px;}
  .logo span{color:#f0c040;}
  .header-sub{font-size:12px;color:#7070a0;margin-top:2px;}

  .container{max-width:680px;margin:0 auto;padding:24px 16px;}

  .client-name{font-size:22px;font-weight:800;margin-bottom:4px;}
  .client-sub{font-size:13px;color:#7070a0;margin-bottom:24px;}

  .section-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#7070a0;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .section-title::after{content:'';flex:1;height:1px;background:#2a2a38;}

  .order-card{background:#16161e;border-radius:12px;border:1px solid #2a2a38;margin-bottom:12px;overflow:hidden;}
  .order-card.printing{border-left:4px solid #f0c040;}
  .order-card.ready{border-left:4px solid #50c880;}
  .order-card.delivered{border-left:4px solid #3a3a58;opacity:0.7;}

  .order-header{padding:14px 16px;display:flex;align-items:flex-start;gap:12px;}
  .order-img{width:56px;height:56px;border-radius:8px;object-fit:cover;background:#1e1e28;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;}
  .order-info{flex:1;min-width:0;}
  .order-title{font-size:14px;font-weight:800;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .order-meta{font-size:11px;color:#7070a0;margin-bottom:6px;}
  .status-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
  .status-printing{background:#f0c04022;color:#f0c040;border:1px solid #f0c04044;}
  .status-ready{background:#50c88022;color:#50c880;border:1px solid #50c88044;}
  .status-pending{background:#2a2a38;color:#7070a0;border:1px solid #3a3a50;}
  .status-delivered{background:#3a3a5822;color:#8080a0;border:1px solid #3a3a5844;}

  /* Progress */
  .progress-wrap{padding:0 16px 12px;}
  .progress-label{display:flex;justify-content:space-between;font-size:11px;color:#7070a0;margin-bottom:5px;}
  .progress-bar-bg{background:#2a2a38;border-radius:4px;height:6px;}
  .progress-bar{height:6px;border-radius:4px;background:linear-gradient(90deg,#f0c040,#f08020);transition:width .5s;}
  .progress-info{font-size:11px;color:#f0c040;font-weight:700;margin-top:5px;display:flex;align-items:center;gap:8px;}

  /* Plates */
  .plates-wrap{padding:0 16px 14px;}
  .plates-label{font-size:10px;color:#7070a0;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
  .plates-list{display:flex;flex-direction:column;gap:5px;}
  .plate-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;background:#1a1a24;}
  .plate-icon{font-size:14px;flex-shrink:0;}
  .plate-name{font-size:12px;font-weight:700;flex:1;}
  .plate-sub{font-size:10px;color:#7070a0;}
  .plate-badge{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:700;flex-shrink:0;}
  .badge-done{background:#50c88018;color:#50c880;}
  .badge-active{background:#f0c04018;color:#f0c040;}
  .badge-pending{background:#2a2a38;color:#7070a0;}

  /* Delivery */
  .delivery-row{padding:10px 16px;border-top:1px solid #2a2a38;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:#7070a0;}
  .delivery-date{font-weight:700;color:#e8e8f0;}

  .empty{text-align:center;padding:60px 20px;color:#3a3a58;}
  .empty-icon{font-size:48px;margin-bottom:12px;}
  .empty-text{font-size:14px;}

  .loading{text-align:center;padding:60px 20px;color:#7070a0;font-size:14px;}

  .refresh-note{text-align:center;font-size:10px;color:#3a3a58;margin-top:24px;padding-bottom:24px;}

  .footer{background:#16161e;border-top:1px solid #2a2a38;padding:14px 20px;text-align:center;font-size:11px;color:#4a4a68;margin-top:32px;}
  .footer a{color:#6060a0;text-decoration:none;}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">⬡ <span>PrintCalc</span> 3D</div>
    <div class="header-sub">Portal de seguimiento de encargos</div>
  </div>
</div>

<div class="container">
  <div id="content"><div class="loading">⏳ Cargando...</div></div>
</div>

<div class="footer">
  Esta página se actualiza automáticamente cada 30 segundos.<br>
  Gestionado con <a href="https://esponaantonio.github.io/printcalc/" target="_blank">PrintCalc 3D</a>
</div>

<script>
const SUPABASE_URL = 'https://igxxxetklfusxsfcaaaa.supabase.co';
const SUPABASE_KEY = 'sb_publishable_J7kqwDFi1Fd8GNrXsuiosw_vkXdjuBy';
const PROXY         = 'https://bambuproxy-production.up.railway.app';
const PROXY_SECRET  = 'printcalc_proxy_2026_antonio';
const PROXY_HEADERS = { 'x-proxy-secret': PROXY_SECRET };

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Get client code from URL
const params = new URLSearchParams(window.location.search);
const clientCode = params.get('c') || params.get('cliente');

let allOrders   = [];
let printerData = [];
let assignments = {};
let clientName  = '';

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('es-ES', {day:'numeric', month:'long', year:'numeric'});
}
function fmtDuration(mins) {
  if (!mins || mins <= 0) return '—';
  const h = Math.floor(mins/60), m = Math.round(mins%60);
  return h>0 ? `${h}h ${m}m` : `${m}m`;
}
function priLabel(p) {
  if (!p || p>=99) return '';
  return ['','🔴','🟠','🟡','🔵'][p] || '';
}

// Session storage key so they don't have to re-enter name on refresh
const SESSION_KEY = 'printcalc_portal_verified';

function verifyName(clientName, orders) {
  return new Promise(resolve => {
    // Check session storage first
    if (sessionStorage.getItem(SESSION_KEY) === clientName) {
      resolve(true); return;
    }

    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;inset:0;background:#000d;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
    modal.innerHTML = `
      <div style="background:#16161e;border-radius:14px;padding:28px 24px;max-width:360px;width:100%;border:1px solid #2a2a38;box-shadow:0 8px 40px #000a;">
        <div style="font-size:28px;text-align:center;margin-bottom:12px;">🔒</div>
        <div style="font-size:17px;font-weight:800;text-align:center;margin-bottom:6px;">Verificación</div>
        <div style="font-size:13px;color:#7070a0;text-align:center;margin-bottom:20px;">Introduce tu nombre para acceder a tus encargos</div>
        <input id="verify-input" type="text" placeholder="Tu nombre..." autocomplete="name"
          style="width:100%;background:#1e1e28;color:#e8e8f0;border:1px solid #2a2a38;border-radius:8px;padding:12px 14px;font-size:14px;font-family:'Syne',sans-serif;outline:none;margin-bottom:8px;">
        <div id="verify-error" style="font-size:11px;color:#e03040;text-align:center;min-height:16px;margin-bottom:10px;"></div>
        <button id="verify-btn"
          style="width:100%;background:#3030a0;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;">
          Acceder →
        </button>
      </div>`;
    document.body.appendChild(modal);

    const input = modal.querySelector('#verify-input');
    const btn   = modal.querySelector('#verify-btn');
    const err   = modal.querySelector('#verify-error');

    input.focus();

    function tryVerify() {
      const entered = input.value.trim().toLowerCase();
      if (!entered) { err.textContent = 'Introduce tu nombre'; return; }
      if (entered === clientName.toLowerCase()) {
        sessionStorage.setItem(SESSION_KEY, clientName);
        document.body.removeChild(modal);
        resolve(true);
      } else {
        err.textContent = 'Nombre no reconocido. Inténtalo de nuevo.';
        input.style.borderColor = '#e03040';
        setTimeout(() => input.style.borderColor = '#2a2a38', 1500);
        input.value = '';
        input.focus();
      }
    }

    btn.onclick = tryVerify;
    input.onkeydown = e => { if (e.key === 'Enter') tryVerify(); };
  });
}


async function loadData() {
  if (!clientCode) {
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔒</div>
        <div class="empty-text">Enlace no válido.<br>Contacta con el taller para obtener tu enlace de seguimiento.</div>
      </div>`;
    return;
  }

  try {
    // Load from Supabase
    const { data, error } = await sb.from('printcalc_data').select('orders,cfg,assignments').eq('id','main').single();
    if (error || !data) throw new Error('No se pudieron cargar los datos');

    // Only extract portalCodes from cfg — never expose financial config
    let portalCodes = {};
    try { portalCodes = JSON.parse(data.cfg || '{}').portalCodes || {}; } catch(_) {}
    assignments = JSON.parse(data.assignments || '{}');

    // Find client name from portal codes
    clientName = Object.entries(portalCodes).find(([,code]) => code === clientCode)?.[0];

    if (!clientName) {
      document.getElementById('content').innerHTML = `
        <div class="empty">
          <div class="empty-icon">🔍</div>
          <div class="empty-text">No se encontró ningún encargo con este enlace.</div>
        </div>`;
      return;
    }

    // Ask for name verification
    const verified = await verifyName(clientName, JSON.parse(data.orders||'[]'));
    if (!verified) return;

    // Filter orders for this client
    allOrders = JSON.parse(data.orders || '[]')
      .filter(o => o.pedido && (o.cliente||'').toLowerCase() === clientName.toLowerCase());

    // Load printer states
    try {
      const r = await fetch(`${PROXY}/devices`, { headers: PROXY_HEADERS, signal: AbortSignal.timeout(5000) });
      const d = await r.json();
      printerData = d.devices || [];
    } catch(e) { printerData = []; }

    render();
  } catch(e) {
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <div class="empty-text">Error al cargar los datos.<br><small style="color:#606080;">${e.message}</small></div>
      </div>`;
  }
}

function getProductionJobs(order) {
  return order.productionJobs || order.plates?.map((p,i) => ({
    plateIdx:i, status:'pending', printerId:null
  })) || [];
}

function render() {
  if (!allOrders.length) {
    document.getElementById('content').innerHTML = `
      <div class="client-name">${clientName}</div>
      <div class="empty" style="padding:40px 0;">
        <div class="empty-icon">📭</div>
        <div class="empty-text">No hay encargos activos en este momento.</div>
      </div>`;
    return;
  }

  // Group
  const printing  = allOrders.filter(o => !o.entregado && getProductionJobs(o).some(j=>j.status==='printing'||j.status==='done') && !getProductionJobs(o).every(j=>j.status==='done'));
  const ready     = allOrders.filter(o => !o.entregado && getProductionJobs(o).length>0 && getProductionJobs(o).every(j=>j.status==='done'));
  const pending   = allOrders.filter(o => !o.entregado && !printing.includes(o) && !ready.includes(o));
  const delivered = allOrders.filter(o => o.entregado).slice(-5).reverse();

  let html = `
    <div class="client-name">${clientName}</div>
    <div class="client-sub">Aquí puedes seguir el estado de tus encargos en tiempo real</div>`;

  if (printing.length) {
    html += `<div class="section-title">🖨 En producción</div>`;
    printing.forEach(o => html += renderCard(o, 'printing'));
  }
  if (ready.length) {
    html += `<div class="section-title" style="margin-top:20px;">✅ Listo para recoger</div>`;
    ready.forEach(o => html += renderCard(o, 'ready'));
  }
  if (pending.length) {
    html += `<div class="section-title" style="margin-top:20px;">⏳ Pendiente</div>`;
    pending.forEach(o => html += renderCard(o, 'pending'));
  }
  if (delivered.length) {
    html += `<div class="section-title" style="margin-top:20px;">📦 Entregado</div>`;
    delivered.forEach(o => html += renderCard(o, 'delivered'));
  }

  const now = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  html += `<div class="refresh-note">Actualizado a las ${now} · Se refresca cada 30 segundos</div>`;

  document.getElementById('content').innerHTML = html;
  document.title = `${clientName} — Seguimiento PrintCalc`;
}

function renderCard(o, type) {
  const jobs  = getProductionJobs(o);
  const baseDesc = o.desc.replace(/ \(\d+\/\d+\)$/,'');

  // Find active assignment
  const asgn = Object.entries(assignments).find(([,a]) => String(a.orderId)===String(o.id));
  const asgnDevId = asgn?.[0];
  const device = printerData.find(d => d.dev_id === asgnDevId);
  const pct    = device?.state?.mc_percent || 0;
  const rem    = device?.state?.mc_remaining_time || 0;
  const printerName = device?.name?.replace(/h2s /i,'') || '';

  // Status badge
  const badgeHtml = type === 'printing'
    ? `<span class="status-badge status-printing">⟳ Imprimiendo${printerName?' · '+printerName:''}</span>`
    : type === 'ready'
      ? `<span class="status-badge status-ready">✅ Listo para recoger</span>`
      : type === 'delivered'
        ? `<span class="status-badge status-delivered">📦 Entregado</span>`
        : `<span class="status-badge status-pending">⏳ En espera</span>`;

  // Image
  const imgHtml = o.image
    ? `<img src="${o.image}" class="order-img" alt="">`
    : `<div class="order-img">🖨</div>`;

  // Plates
  const platesHtml = (o.plates||[]).map((p, pi) => {
    const pJobs = jobs.filter(j => j.plateIdx === pi);
    const done  = pJobs.length>0 && pJobs.every(j=>j.status==='done');
    const active = pJobs.some(j=>j.status==='printing');
    const icon  = done ? '✅' : active ? '⟳' : '⏳';
    const badge = done ? 'badge-done' : active ? 'badge-active' : 'badge-pending';
    const label = done ? 'Hecha' : active ? 'Imprimiendo' : 'Pendiente';
    const timeH = parseFloat(p.time||0);
    return `<div class="plate-row">
      <span class="plate-icon">${icon}</span>
      <div style="flex:1;">
        <div class="plate-name">${p.name||'Parte '+(pi+1)}</div>
        ${timeH>0?`<div class="plate-sub">${timeH.toFixed(1)}h de impresión</div>`:''}
      </div>
      <span class="plate-badge ${badge}">${label}</span>
    </div>`;
  }).join('');

  // Progress for printing
  const doneCount = jobs.filter(j=>j.status==='done').length;
  const totalCount = jobs.length;
  const jobPct = totalCount>0 ? Math.round(doneCount/totalCount*100) : 0;

  let progressHtml = '';
  if (type === 'printing' && pct > 0) {
    progressHtml = `<div class="progress-wrap">
      <div class="progress-label">
        <span>Placa actual</span>
        <span style="font-family:'Space Mono',monospace;">${pct}%</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="progress-info">
        ${rem>0?`⏱ ${Math.floor(rem/60)}h ${rem%60}m restantes`:''}
        <span style="color:#7070a0;">${doneCount}/${totalCount} partes completadas</span>
      </div>
    </div>`;
  } else if (type === 'printing') {
    progressHtml = `<div class="progress-wrap">
      <div class="progress-label"><span>Progreso general</span><span>${doneCount}/${totalCount} partes</span></div>
      <div class="progress-bar-bg"><div class="progress-bar" style="width:${jobPct}%"></div></div>
    </div>`;
  }

  // Delivery date: use scheduledDelivery if set, else estimate from remaining plate hours
  function getEstimatedDelivery(o) {
    if (o.entregado && o.fecha) return fmtDate(o.fecha);
    // Use explicit scheduled delivery if available
    if (o.scheduledDelivery) return fmtDate(o.scheduledDelivery);
    // Estimate: sum remaining plate hours from now
    const jobs = getProductionJobs(o);
    const pendingPlates = (o.plates||[]).filter((p, pi) => {
      const pJobs = jobs.filter(j => j.plateIdx === pi);
      return pJobs.length === 0 || pJobs.some(j => j.status !== 'done');
    });
    const totalRemainingH = pendingPlates.reduce((s, p) => s + parseFloat(p.time||0), 0);
    if (totalRemainingH > 0) {
      const est = new Date(Date.now() + totalRemainingH * 3600000);
      return est.toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});
    }
    if (o.fecha) return fmtDate(o.fecha);
    return null;
  }

  const deliveryDate = getEstimatedDelivery(o);
  const deliveryHtml = deliveryDate && type !== 'delivered'
    ? `<div class="delivery-row"><span>Entrega estimada</span><span class="delivery-date">${deliveryDate}</span></div>`
    : o.entregado && o.fecha
      ? `<div class="delivery-row"><span>Entregado</span><span class="delivery-date">${fmtDate(o.fecha)}</span></div>`
      : '';

  return `<div class="order-card ${type}">
    <div class="order-header">
      ${imgHtml}
      <div class="order-info">
        <div class="order-title">${priLabel(o.priority)} ${baseDesc}</div>
        <div class="order-meta">${o.proyecto||''}</div>
        ${badgeHtml}
      </div>
    </div>
    ${progressHtml}
    ${platesHtml ? `<div class="plates-wrap"><div class="plates-label">Partes</div><div class="plates-list">${platesHtml}</div></div>` : ''}
    ${deliveryHtml}
  </div>`;
}

// Auto-refresh — only update data and printers, never re-verify name
async function refreshData() {
  if (!clientName) return; // not loaded yet
  try {
    const [sbRes, proxyRes] = await Promise.allSettled([
      sb.from('printcalc_data').select('orders,assignments').eq('id','main').single(),
      fetch(`${PROXY}/devices`, { headers: PROXY_HEADERS, signal: AbortSignal.timeout(5000) })
    ]);
    if (sbRes.status === 'fulfilled' && sbRes.value.data) {
      const d = sbRes.value.data;
      allOrders = JSON.parse(d.orders || '[]')
        .filter(o => o.pedido && (o.cliente||'').toLowerCase() === clientName.toLowerCase());
      assignments = JSON.parse(d.assignments || '{}');
    }
    if (proxyRes.status === 'fulfilled') {
      const d = await proxyRes.value.json();
      printerData = d.devices || [];
    }
    render();
  } catch(e) { /* silent — will retry */ }
}

loadData();
setInterval(refreshData, 30000);
</script>
</body>
</html>
